<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>strafever</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #13233a 0%, #090f17 55%, #04070b 100%);
        color: #ecf1ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      main {
        width: min(860px, 92vw);
        border: 1px solid #2f415f;
        border-radius: 12px;
        background: rgba(6, 11, 18, 0.86);
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.4rem;
        letter-spacing: 0.08em;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>strafever | phase 0</h1>
      <pre id="status"></pre>
    </main>
    <script src="./shell.js" defer></script>
  </body>
</html>
