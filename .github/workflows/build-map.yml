name: Build Map Artifact

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assets/mvp_base/**'
      - 'scripts/build-map.ts'
      - 'scripts/build-assets.ts'
      - '.github/workflows/build-map.yml'

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install map compiler (q3map2)
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y p7zip-full
          q3map2_path=""

          if sudo apt-get install -y q3map2; then
            q3map2_path=$(command -v q3map2 || true)
          fi

          if [ -z "$q3map2_path" ] && sudo apt-get install -y netradiant; then
            q3map2_path=$(command -v q3map2 || true)
          fi

          if [ -z "$q3map2_path" ]; then
            release_json=$(curl -fsSL https://api.github.com/repos/Garux/netradiant-custom/releases/latest)
            asset_url=$(echo "$release_json" | jq -r '.assets[] | select(.name | test("linux-x86_64\\.7z$")) | .browser_download_url')

            if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
              echo "Failed to resolve linux-x86_64 netradiant-custom asset URL"
              exit 1
            fi

            curl -fsSL "$asset_url" -o /tmp/netradiant-custom.7z
            mkdir -p /tmp/netradiant-custom
            7z x /tmp/netradiant-custom.7z -o/tmp/netradiant-custom >/dev/null

            q3map2_path=$(find /tmp/netradiant-custom -name 'q3map2*' | head -n 1 || true)
            if [ -n "$q3map2_path" ]; then
              chmod +x "$q3map2_path"
            fi
          fi

          if [ -z "$q3map2_path" ]; then
            echo "q3map2 binary not found. Debug file listing:"
            find /tmp/netradiant-custom -maxdepth 4 -type f | head -n 200 || true
            exit 1
          fi

          echo "STRAFEVER_Q3MAP2=$q3map2_path" >> "$GITHUB_ENV"

      - name: Generate map source and assets
        run: pnpm run build:assets

      - name: Compile map
        run: pnpm run build:map

      - name: Package assets with compiled map
        run: pnpm run build:assets

      - name: Upload map artifact
        uses: actions/upload-artifact@v4
        with:
          name: mvp-box-map
          path: |
            assets/mvp_base/maps/mvp_box.bsp
            dist/assets/baseq3/mvp_base-dev.pk3
            dist/assets/manifest.json
